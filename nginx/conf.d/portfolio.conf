# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name qz-hendrik.com www.qz-hendrik.com;
    return 301 https://qz-hendrik.com$request_uri;
}

# Portfolio — https://qz-hendrik.com (port 443)
server {
    listen 443 ssl;
    server_name qz-hendrik.com www.qz-hendrik.com;

    ssl_certificate /etc/ssl/portfolio/fullchain.crt;
    ssl_certificate_key /etc/ssl/portfolio/private.key;

    location / {
        proxy_pass http://next-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# CMS — https://qz-hendrik.com:8443
server {
    listen 8443 ssl;
    server_name qz-hendrik.com;

    ssl_certificate /etc/ssl/portfolio/fullchain.crt;
    ssl_certificate_key /etc/ssl/portfolio/private.key;

    location / {
        proxy_pass http://payload-cms:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
