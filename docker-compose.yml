services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio_net

  payload-cms:
    build:
      context: ./payload-cms
      target: runner
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URI: ${DATABASE_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: https://${DOMAIN}:8443
    volumes:
      - ./payload-cms/media:/app/media
    networks:
      - portfolio_net

  next-app:
    build:
      context: ./next-app
      target: runner
    restart: unless-stopped
    depends_on:
      - payload-cms
    environment:
      NEXT_PUBLIC_PAYLOAD_API: https://${DOMAIN}:8443/api
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
    networks:
      - portfolio_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/ssl/portfolio:ro
    depends_on:
      - next-app
      - payload-cms
    networks:
      - portfolio_net

volumes:
  postgres_data:

networks:
  portfolio_net:
    driver: bridge
